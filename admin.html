<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body>

<h2>📊 Booking Data</h2>
<div id="data"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0nF8FdvEwMsPuP_hdbSp",
  authDomain: "sevya-photo.firebaseapp.com",
  projectId: "sevya-photo",
  storageBucket: "sevya-photo.appspot.com",
  messagingSenderId: "668901790002",
  appId: "1:668901790002:web:46e69442e",
  measurementId: "G-Z98XVT55DE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const querySnapshot = await getDocs(collection(db, "bookings"));

let html = "";
querySnapshot.forEach(doc => {
  let b = doc.data();
  html += `<p>${b.name} | ${b.phone} | ${b.service} | ${b.date}</p>`;
});

document.getElementById("data").innerHTML = html;
</script>

</body>
</html>
