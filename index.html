<!DOCTYPE html>
<html>
<head>
  <title>Sevya Photo Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #000000, #434343);
      color: white;
      scroll-behavior: smooth;
    }

    header {
      text-align: center;
      padding: 30px 10px;
      animation: fadeDown 1s ease;
    }

    header h1 {
      font-size: 28px;
      margin: 0;
    }

    .container {
      background: white;
      color: black;
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      animation: fadeUp 1.2s ease;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #25D366;
      transform: scale(1.02);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #1ebe5d;
      transform: scale(1.05);
    }

    .gallery {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
    }

    .gallery img {
      width: 120px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }

    @keyframes fadeUp {
      from {opacity:0; transform: translateY(40px);}
      to {opacity:1; transform: translateY(0);}
    }

    @keyframes fadeDown {
      from {opacity:0; transform: translateY(-40px);}
      to {opacity:1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <h1>📸 Sevya Photo Studio</h1>
  <p>Capturing Your Beautiful Moments</p>
</header>

<div class="gallery">
  <img src="https://picsum.photos/200?1">
  <img src="https://picsum.photos/200?2">
  <img src="https://picsum.photos/200?3">
</div>

<div class="container">

  <h3>📅 Book Your Shoot</h3>

  <form id="form">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>

    <select id="service">
      <option>Wedding</option>
      <option>Pre-Wedding</option>
      <option>Baby Shoot</option>
    </select>

    <input type="date" id="date" required>

    <button type="submit">Book Now</button>
  </form>

  <p id="msg"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0nF8FdvEwMsPuP_hdbSp",
  authDomain: "sevya-photo.firebaseapp.com",
  projectId: "sevya-photo",
  storageBucket: "sevya-photo.appspot.com",
  messagingSenderId: "668901790002",
  appId: "1:668901790002:web:46e69442e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let service = document.getElementById("service").value;
  let date = document.getElementById("date").value;

  const q = query(collection(db, "bookings"), where("date", "==", date));
  const snapshot = await getDocs(q);

  if (!snapshot.empty) {
    alert("❌ Aa date already booked chhe!");
    return;
  }

  await addDoc(collection(db, "bookings"), {
    name, phone, service, date
  });

  document.getElementById("msg").innerText = "✅ Booking Successful!";

  let msg = `New Booking 📸%0AName: ${name}%0APhone: ${phone}%0ADate: ${date}%0AService: ${service}`;
  window.open(`https://wa.me/918200033150?text=${msg}`);
});
</script>

</body>
</html>
