<!DOCTYPE html>
<html>
<head>
  <title>Sevya Photo Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 20px;
    }

    form {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 350px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select, button {
      padding: 10px;
      margin: 8px;
      width: 90%;
    }

    button {
      background: #25D366;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>📸 Sevya Photo Studio</h1>
<h3>Book Your Shoot</h3>

<form id="form">
  <input type="text" id="name" placeholder="Your Name" required><br>
  <input type="text" id="phone" placeholder="Phone Number" required><br>

  <select id="service">
    <option>Wedding</option>
    <option>Pre-Wedding</option>
    <option>Baby Shoot</option>
    <option>Video Editing</option>
  </select><br>

  <input type="date" id="date" required><br>

  <button type="submit">Book Now</button>
</form>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0nF8FdvEwMsPuP_hdbSp",
  authDomain: "sevya-photo.firebaseapp.com",
  projectId: "sevya-photo",
  storageBucket: "sevya-photo.appspot.com",
  messagingSenderId: "668901790002",
  appId: "1:668901790002:web:46e69442e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let service = document.getElementById("service").value;
  let date = document.getElementById("date").value;

  // 🔒 Date lock check
  const q = query(collection(db, "bookings"), where("date", "==", date));
  const snapshot = await getDocs(q);

  if (!snapshot.empty) {
    alert("❌ Aa date already booked chhe!");
    return;
  }

  // 💾 Save booking
  await addDoc(collection(db, "bookings"), {
    name,
    phone,
    service,
    date
  });

  document.getElementById("msg").innerText = "✅ Booking Successful!";

  // 📲 WhatsApp message
  let msg = `New Booking 📸%0AName: ${name}%0APhone: ${phone}%0ADate: ${date}%0AService: ${service}`;
  window.open(`https://wa.me/918200033150?text=${msg}`);

});
</script>

</body>
</html>
