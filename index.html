<!DOCTYPE html>
<html>
<head>
  <title>Sevya Photo Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #000000, #434343);
      color: white;
      scroll-behavior: smooth;
    }

    /* 🔥 Loader */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #ccc;
      border-top: 5px solid #25D366;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    header {
      text-align: center;
      padding: 30px;
    }

    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      margin: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #25D366;
      color: white;
    }

    .gallery {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
    }

    .gallery img {
      width: 150px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }

    .fade {
      opacity: 0;
      transform: translateY(40px);
      transition: 1s;
    }

    .fade.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
</div>

<header class="fade">
  <h1>📸 Sevya Photo Studio</h1>
  <p>Premium Photography Experience</p>
</header>

<div class="gallery fade">
  <!-- 👉 Ahiya tamara real photo mukje -->
  <img src="https://picsum.photos/200?1">
  <img src="https://picsum.photos/200?2">
  <img src="https://picsum.photos/200?3">
</div>

<div class="glass fade">

  <h3>📅 Book Your Shoot</h3>

  <form id="form">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>

    <select id="service">
      <option>Wedding</option>
      <option>Pre-Wedding</option>
      <option>Baby Shoot</option>
    </select>

    <input type="date" id="date" required>

    <button type="submit">Book Now</button>
  </form>

  <p id="msg"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0nF8FdvEwMsPuP_hdbSp",
  authDomain: "sevya-photo.firebaseapp.com",
  projectId: "sevya-photo",
  storageBucket: "sevya-photo.appspot.com",
  messagingSenderId: "668901790002",
  appId: "1:668901790002:web:46e69442e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 Loader hide
window.addEventListener("load", ()=>{
  document.getElementById("loader").style.display = "none";
});

// 🔥 Scroll animation
const fades = document.querySelectorAll(".fade");
window.addEventListener("scroll", ()=>{
  fades.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add("show");
    }
  });
});

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  let name = name.value;
  let phone = phone.value;
  let service = service.value;
  let date = date.value;

  const q = query(collection(db, "bookings"), where("date", "==", date));
  const snapshot = await getDocs(q);

  if (!snapshot.empty) {
    alert("❌ Aa date already booked chhe!");
    return;
  }

  await addDoc(collection(db, "bookings"), {
    name, phone, service, date
  });

  document.getElementById("msg").innerText = "✅ Booking Successful!";

  let msg = `New Booking 📸%0AName: ${name}%0APhone: ${phone}%0ADate: ${date}%0AService: ${service}`;
  window.open(`https://wa.me/918200033150?text=${msg}`);
});
</script>

</body>
</html>
