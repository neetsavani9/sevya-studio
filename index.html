<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0nF8FdvEwMsPuP_hdbSp",
  authDomain: "sevya-photo.firebaseapp.com",
  projectId: "sevya-photo",
  storageBucket: "sevya-photo.appspot.com",
  messagingSenderId: "668901790002",
  appId: "1:668901790002:web:46e69442e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Loader hide
window.addEventListener("load", ()=>{
  document.getElementById("loader").style.display = "none";
});

// Scroll animation
const fades = document.querySelectorAll(".fade");
window.addEventListener("scroll", ()=>{
  fades.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add("show");
    }
  });
});

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  // ✅ Correct way
  let nameVal = document.getElementById("name").value;
  let phoneVal = document.getElementById("phone").value;
  let serviceVal = document.getElementById("service").value;
  let dateVal = document.getElementById("date").value;

  // Date lock
  const q = query(collection(db, "bookings"), where("date", "==", dateVal));
  const snapshot = await getDocs(q);

  if (!snapshot.empty) {
    alert("❌ Aa date already booked chhe!");
    return;
  }

  // Save
  await addDoc(collection(db, "bookings"), {
    name: nameVal,
    phone: phoneVal,
    service: serviceVal,
    date: dateVal
  });

  document.getElementById("msg").innerText = "✅ Booking Successful!";

  // WhatsApp
  let msg = `New Booking 📸%0AName: ${nameVal}%0APhone: ${phoneVal}%0ADate: ${dateVal}%0AService: ${serviceVal}`;
  window.open(`https://wa.me/918200033150?text=${msg}`);
});
</script>
