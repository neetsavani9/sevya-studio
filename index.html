<!DOCTYPE html>
<html>
<head>
  <title>Sevya Photo Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; text-align:center; background:#f5f5f5; }
    input, select, button { padding:10px; margin:5px; width:80%; max-width:300px; }
    button { background:#25D366; color:white; border:none; }
  </style>
</head>

<body>

<h1>Sevya Photo Studio 📸</h1>

<h2>Book Your Shoot</h2>

<form id="form">
  <input type="text" id="name" placeholder="Name" required><br>
  <input type="text" id="phone" placeholder="Phone" required><br>

  <select id="service">
    <option>Wedding</option>
    <option>Pre-Wedding</option>
    <option>Baby Shoot</option>
    <option>Video Editing</option>
  </select><br>

  <input type="date" id="date"><br>

  <button type="submit">Book Now</button>
</form>

<p id="msg"></p>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0nF8FdvEwMsPuP_hdbSp",
  authDomain: "sevya-photo.firebaseapp.com",
  projectId: "sevya-photo",
  storageBucket: "sevya-photo.appspot.com",
  messagingSenderId: "668901790002",
  appId: "1:668901790002:web:46e69442e",
  measurementId: "G-Z98XVT55DE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  await addDoc(collection(db, "bookings"), {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    service: document.getElementById("service").value,
    date: document.getElementById("date").value
  });

  document.getElementById("msg").innerText = "✅ Booking Successful!";
});
</script>

</body>
</html>
